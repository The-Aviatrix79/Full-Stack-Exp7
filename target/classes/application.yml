spring:
  datasource:
    url: jdbc:h2:mem:rbacdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: change-this-to-a-very-long-secure-secret-key-for-jwt-signing
    expiration-ms: 3600000

server:
  error:
    include-message: always
